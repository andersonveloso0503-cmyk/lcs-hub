<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LCS Hub — CRM, Instagram & Google Ads</title>

    <!-- PWA: manifest e ícones -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- PWA: comportamento de tela cheia no iOS (Safari não lê o manifest.json) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LCS Hub" />

    <!-- Cor da barra de status / moldura do navegador em Android -->
    <meta name="theme-color" content="#0D1B2A" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {
            // Falha silenciosa: o app funciona normalmente sem service worker,
            // só não fica instalável como PWA nesse caso.
          });
        });
      }
    </script>
  </body>
</html>
